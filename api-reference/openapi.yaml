    ## 5. Events

    ### 5.1. Event Listener

    The widget sends events to the parent window using **postMessage**.

    ```javascript
    window.addEventListener('message', (event) => {
        if (event.data?.type === 'close_frame') {
            // close the modal or remove the iframe 
        }
    });
    ```

