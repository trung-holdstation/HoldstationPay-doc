info:
  description: |-
    # Holdstation Pay API Integration Guide

    ## 1. Overview
    **Holdstation Pay** is a digital asset payment intermediary, providing payment solutions for both domestic and international partners.

    This document guides partners through integrating with the **Holdstation Pay API** to perform **buy/sell token transactions using VND**. You will find:

    - Purpose and scope of the integration
    - API endpoints
    - Authentication
    - Order flow
    - Webhook mechanism

    ---

    ## 2. Base URLs

    | Environment | API Base URL                      |
    |-------------|-----------------------------------|
    | Production  | `https://pay-api.holdstation.com` |
    | Sandbox     | `https://payment.capybera.xyz`    |

    ---

    ## 3. Authentication

    To authenticate API requests, you need to include a valid API key in the request headers. You can request an API key by contacting our support team.

    **Header Format:**
    ```
    Partner-App-Key: YOUR_API_KEY
    ```

    ---

    ## 4. `Order flow`, `States` and `Processing States`

    ### 4.1 Order States and Processing States

    Holdstation Pay uses specific order states and processing states to track the status of each order.
    When creating an order, you can use `callback` parameter to receive real-time updates about order status changes, see [Webhook Integration](#5-webhook-integration).

    Order states table:
    | State       | Value | Description                                             |
    |-------------|-------|---------------------------------------------------------|
    | New         | 1     | Order has been created (You should never see this state)|
    | Processing  | 2     | Order is being processed                                |
    | Completed   | 3     | Order has been completed successfully                   |
    | Failed      | 4     | Order has failed                                        |
    | Closed      | 5     | Order has been closed                                   |

    When order state is `Processing`, it will have more detailed `Processing States` as below:
    | Processing State      | Value | Description                          |
    |-----------------------|-------|--------------------------------------|
    | **For Deposit Orders**                                               |
    | Fiat Pending          | 10    | Waiting for user to deposit fiat     |
    | Fiat Confirmed        | 11    | Fiat deposit confirmed               |
    | Fiat Failed           | 12    | Fiat failed to deposit               |
    | Crypto Pending        | 13    | Waiting for USDT transfer on-chain   |
    | Crypto Confirmed      | 14    | USDT transfer confirmed              |
    | Crypto Failed         | 15    | USDT failed to transfer              |
    | **For Withdrawal Orders**                                            |
    | Crypto Pending        | 20    | Waiting for user to transfer USDT    |
    | Crypto Confirmed      | 21    | USDT transfer confirmed              |
    | Crypto Failed         | 22    | USDT failed to transfer              |
    | Fiat Pending          | 23    | Waiting for VND transfer             |
    | Fiat Confirmed        | 24    | VND transfer confirmed               |
    | Fiat Failed           | 25    | VND failed to transfer               |

    ```mermaid
    ---
    title: ORDER STATES
    ---
    stateDiagram-v2
        state "Processing = 2" as P
        state "Completed = 3" as C
        state "Failed = 4" as F
        state "Closed = 5" as CL

        [*] --> P: Create new order
        P --> C: Complete USDT/VND transfering
        P --> F: Failed at some step
        P --> CL: Expired or closed manually
        C --> [*]
        F --> [*]
        CL --> [*]
    ```

    ### 4.2 Onramp Flow (Buying USDT with VND)

    ```mermaid
    ---
    title: ONRAMP FLOW
    ---
    sequenceDiagram
        actor U as User
        participant P as Partner
        participant H as Holdstation Pay
        participant Bank
        participant B as Blockchain

        U->>P: Request to buy USDT
        Note over U, P: Input amount in VND
        P->>+H: POST /partners/orders/deposit
        Note over P, H: Use callback for order state update
        H-->>H: Calculate USDT amount to receive
        H-->>-P: Returns {order + payment info}
        P-->>U: Show QR code from payment_info
        U->>P: Scan QR code using banking app
        U->>Bank: Confirm and transfer
        Bank-->>+H: Notify transfer result
        H-->>H: Verify payment
        H->>-B: Execute transfering USDT
        B->>U: Transfer USDT
    ```
    <p style="text-align:center;"><i>Integration flow for buying USDT using VND via Holdstation Pay.</i></p>

    ```mermaid
    ---
    title: ONRAMP PROCESSING STATES FLOW
    ---
    stateDiagram-v2
        state "State -> Completed" as C
        state "State -> Failed" as F
        state "State -> Closed" as CL
        state "Fiat Pending = 10" as FP
        state "Fiat Confirmed = 11" as FC
        state "Fiat Failed = 12" as FF
        state "Crypto Pending = 13" as CP
        state "Crypto Confirmed = 14" as CC
        state "Crypto Failed = 15" as CF

        [*] --> FP
        FP --> FC: Bank notify successful result
        FP --> CL: Order expired or closed manually
        FP --> FF: Bank notify failure result
        FF --> F
        FC --> CP: Transfer USDT
        CP --> CC: Transfer successful
        CC --> C
        CP --> CF: Failed to transfer
        CF --> F
        F --> [*]
        C --> [*]
        CL --> [*]
    ```
    <p style="text-align:center;"><i>Processing states flow for onramp orders.</i></p>

    ### 4.3 Offramp Flow (Selling USDT for VND)

    ```mermaid
    ---
    title: OFFRAMP FLOW
    ---
    sequenceDiagram
        actor U as User
        participant P as Partner
        participant H as Holdstation Pay
        participant B as Blockchain
        participant Bank

        U->>P: Request to sell USDT
        Note over U, P: Input amount in USD
        P->>+H: POST /partners/orders/withdrawal
        Note over P, H: Use callback for order state update
        H-->>H: Calculate VND amount to receive
        H-->>H: Lock recipient wallet for this order
        H->>B: Subscribe for Transfer event
        H-->>P: Returns {order + recipient addr}
        P-->>U: Show recipient addr + USDT amount
        U->>B: Transfer exact USDT amount to {recipient}
        B-->>H: Transfer event log
        H-->>H: Verify transfered amount
        H->>-Bank: Make a VND transfer request
        Bank-->>U: Transfer VND
        Bank-->>+H: Transfer successul result
        H-->>-H: Release wallet
    ```
    <p style="text-align:center;"><i>Integration flow for selling USDT for VND via Holdstation Pay.</i></p>

    Processing states flow for offramp orders:
    ```mermaid
    ---
    title: OFFRAMP PROCESSING STATES FLOW
    ---
    stateDiagram-v2
        state "State -> Completed" as C
        state "State -> Failed" as F
        state "State -> Closed" as CL
        state "Crypto Pending = 20" as CP
        state "Crypto Confirmed = 21" as CC
        state "Crypto Failed = 22" as CF
        state "Fiat Pending = 23" as FP
        state "Fiat Confirmed = 24" as FC
        state "Fiat Failed = 25" as FF

        [*] --> CP
        CP --> CC: Transfer event verified
        CP --> CF: Transfer failed
        CP --> CL: Order expired or closed manually
        CF --> F
        CC --> FP: Transfer VND
        FP --> FC: Transfer successful
        FC --> C
        FP --> FF: Failed to transfer
        FF --> F
        F --> [*]
        C --> [*]
        CL --> [*]
    ```
    <p style="text-align:center;"><i>Processing states flow for offramp orders.</i></p>

