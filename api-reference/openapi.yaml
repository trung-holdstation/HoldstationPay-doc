    ## 8. Partner Integration (Holdstation Partners)
    ### 8.1. Overview

    When users interact with the Holdstation Pay Widget embedded on a Partner’s site, the Partner must pass a unique identifier called `Partner Key` into the Widget (provided by Holdstation). 

    This ensures that all transactions are accurately attributed to that Partner, supporting revenue-sharing calculations and tracking the transaction volume generated from their platform.

    ### 8.2. Integration Mechanism

    *Widget Load*: When the Widget has fully loaded and is in a ready state, it will emit an event called `PAY_HOLDSTATION_START`

    *Partner Response*: The Partner’s website needs to listen for this event. As soon as the `PAY_HOLDSTATION_START` signal is received, the Partner must immediately send back a `SET_PARTNER_KEY` message containing the Partner ID.

    ### 8.3. Usage Examples on React

    ```javascript
    const ref = useRef<HTMLIFrameElement>(null);

      useEffect(() => {
        const handleMessage = (event) => {
        
        //on event pay holdstation start 
          if (event.data?.type === 'PAY_HOLDSTATION_START') {
            // set partner key
            ref.current?.contentWindow?.postMessage(
              {
                type: 'SET_PARTNER_KEY',
                key: '***',
              },
              '*'
            );
          }
        };

        window.addEventListener('message', handleMessage);
        return () => {
          window.removeEventListener('message', handleMessage);
        };
      }, []);

    return <iframe
            ref={ref}
    ....
    />
    ```

    ### 8.4. Signature algorithm

    #### 8.4.1. Basic rules

    1. The signature is generated using the Ed25519 cryptographic signature scheme on the formatted string.
    2. All fields are separated by underscore `_` even if the field is empty.
    3. All sign message characters are lower case.

    #### 8.4.2. Sign message format

    Onramp (Buy):
    ```
    {amount}_{callback}_{chain_id}_{currency}_{recipient}_{reference_no}_{token_address}
    ```

    Offramp (Sell):
    ```
    {amount}_{callback}_{chain_id}_{currency}_{bank_bin_code}_{bank_account_number}_{token_address}
    ```

    #### 8.4.3. Example

    Go example
    ```go
    package main

    import (
        "crypto/ed25519"
        "encoding/base64"
        "strings"
    )

    var sampleSignKey = "Qd2XliU6/I6YD3OELdeBQ57z6Q9/OHGBTjCNVLB8s/1KpvoU6aiuuBTgQ72IW/yA0aYYnfbCX31zhJKsPnRE5Q=="

    func sign(msg string) string {
        signKey, _ := base64.StdEncoding.DecodeString(sampleSignKey)
        signature := ed25519.Sign(ed25519.PrivateKey(signKey), []byte(msg))
        return base64.StdEncoding.EncodeToString(signature)
    }

    func main() {
        params := []string{
            "1000000", // amount
            "",        // callback
            "56",      // chain_id
            "",        // currency
            "0x0000000000000000000000000000000000000000", // recipient
            "rmtbPVEKwLzz27Qs51Jio",                      // reference_no
            "0x55d398326f99059ff775485246999027b3197955", // token_address
        }
        signMessage := strings.Join(params, "_")
        signMessage = strings.ToLower(signMessage)
        signature := sign(signMessage)
        println("Message:", signMessage)
        println("Signature:", signature)
    }
    ```

    Output
    ```
    Message: 1000000__56__0x0000000000000000000000000000000000000000_rmtbPVEKwLzz27Qs51Jio_0x55d398326f99059ff775485246999027b3197955
    Signature: +EEox+pWc3dC854Av3eIzLbGthud0p2/xrosE9tcOHvLEji8uajyJzDwV95IFClhmCnCqPXtjQsZmYS0jrtgBw==
    ```
