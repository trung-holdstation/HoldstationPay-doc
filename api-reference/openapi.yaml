    # Holdstation Pay Widget Integration Guide

    ## Table of Contents

    1. [Overview](#1-overview)
    2. [Quick Integration](#2-quick-integration)
    3. [Configuration Parameters](#3-configuration-parameters)
    4. [Supported Chains & Tokens](#4-supported-chains--tokens)
    5. [Events](#5-events)
    6. [UI Customization](#6-ui-customization)
    7. [Usage Examples on React](#7-usage-examples-on-react)

    ## 1. Overview

    The Holdstation Pay Widget allows partners to integrate crypto payment functionality directly into their websites or applications quickly, without needing to build a wallet system or handle complex blockchain processes.

    ### 1.1 Workflow:

    1. **Partner Client:** Generate a widget URL with the defined parameters
    2. **User:** Confirm the transaction on the widget.
    3. **HoldstationPay Widget:** Process the transaction on the blockchain.
    4. **Partner Client:** Receive the returned result via window.postMessage to update the UI.

    ### 1.2 Integration methods

    Holdstation supports two integration methods:

    **Iframe Integration**

    * No SDK required
    * Compatible with all frameworks (React, Vue, plain HTML)

    **Web SDK (Optional – In Development)**

    ### 1.3 Sandbox & Production

    | **Environment** | **API Base URL** |
    | --- | --- |
    | Sandbox | <https://pay.capybera.xyz> |
    | Production | <https://pay.holdstation.com> |

    ## 2. Quick Integration

    The primary integration method is using an iframe. Below is a sample code snippet to embed the widget into your webpage:

    **Insert the widget inside the `<iframe>` tag**

    ```html
    <iframe
        src="https://pay.capybera.xyz/?wallet=<WALLET>&theme=dark&lang=en &method=buy&token_address=<TOKEN>&chain_id=<CHAIN_ID>"
        width="100%"
        height="650"
        frameborder="0"
        style="border-radius: 16px; overflow: hidden;">
    </iframe>
    ```

    ## 3. Configuration Parameters

    To initialize the widget, you need to pass the parameters (Query Parameters) into the iframe's src URL.

    **Staging Base URL:** `https://pay.capybera.xyz`

    | **Param** | **Data Type** | **Required** | **Description** |
    | --- | --- | --- | --- |
    | theme | string | Optional | **light** or **dark** interface. Default: **dark**. |
    | lang | string | Optional | Language: **en** or **vi**. Default: **en**. |
    | wallet | string | Optional | User wallet address to receive assets |
    | method | string | Optional | **buy** or **sell**. Default: **buy** |
    | token_address | string | Optional | Token address of the payment token ([see Section 4](#4-supported-chains--tokens)). |
    | chain_id | number | Optional | Blockchain network ID ([see Section 4](#4-supported-chains--tokens)). |
    | amount | number | Optional | Amount of the payment token|
    | bin_code | number | Optional | BIN code (Only applicable when method = sell). |
    | bank_account_number | number | Optional | Bank account number to receive funds when the user sells crypto (Only applicable when method = sell) |
    | pk | string | Optional | The Partner app key is provided by Holdstation|
    | reference_no | string | Optional | Reference order number for partner tracking purposes. |
    | signature | string | Optional | Ed25519 signature for request validation. |



    **Example:**

    Buy Flow

    ```
    https://pay.capybera.xyz/?wallet=0x0A24a21949b4eB8b7F434487fE31CA7b96148A4E&theme=dark&method=buy&token_address=0x8d0d000ee44948fc98c9b98a4fa4921476f08b0d&chain_id=56
    ```

    Sell Flow

    ```
    https://pay.capybera.xyz/?wallet=0x0A24a21949b4eB8b7F434487fE31CA7b96148A4E&theme=dark&method=sell&token_address=0x8d0d000ee44948fc98c9b98a4fa4921476f08b0d&chain_id=56&bin_code=970423&bank_account_number=03815492701
    ```

